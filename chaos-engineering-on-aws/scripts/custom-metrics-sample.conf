# Custom Metrics Configuration for monitor.sh
# Format: NAMESPACE|METRIC_NAME|DIMENSION_NAME|DIMENSION_VALUE|STAT
# Lines starting with # are ignored
#
# Usage: CUSTOM_METRICS_FILE=custom-metrics-sample.conf ./monitor.sh
#
# Examples:
AWS/ApplicationELB|RequestCount|LoadBalancer|app/my-alb/1234|Sum
CustomApp/PetSite|OrdersPerMinute|Service|payment|Average
